<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List</title>
</head>
<body>
    <h2>Student List</h2>
    <a href="{% url 'add_student' %}">Add Student</a>
    <table border="1" cellpadding="5">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Password</th>
            <th>Age</th>
            <th>City</th>
            <th>Action</th>
        </tr>
        {% for s in students %}
        <tr>
            <td>{{ s.name }}</td>
            <td>{{ s.email }}</td>
            <td>{{ s.password }}</td>
            <td>{{ s.age }}</td>
            <td>{{ s.city }}</td>
            <td>
                <a href="{% url 'edit_student' s.id %}">Edit</a>
                <a href="{% url 'delete_student' s.id %}">Delete</a>
            </td>

        </tr>
        {% empty %}
        <tr><td colspan="6">no data found</td></tr>

        {% endfor %}

    </table>
    <a href="{% url 'add_student' %}">Add New Student</a>
    
</body>
</html>
